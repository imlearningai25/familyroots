<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#818cf8"/>
      <stop offset="1" stop-color="#4338ca"/>
    </linearGradient>
    <!-- Subtle inner glow on root node -->
    <radialGradient id="rg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.85"/>
    </radialGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- ── Connector lines (drawn behind nodes) ── -->

  <!-- You → parent horizontal bar -->
  <line x1="32" y1="46" x2="32" y2="42" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.55"/>
  <line x1="18" y1="42" x2="46" y2="42" stroke="white" stroke-width="1.8" opacity="0.55"/>
  <line x1="18" y1="42" x2="18" y2="35" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.55"/>
  <line x1="46" y1="42" x2="46" y2="35" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.55"/>

  <!-- Left parent → grandparent horizontal bar -->
  <line x1="18" y1="30" x2="18" y2="26" stroke="white" stroke-width="1.4" stroke-linecap="round" opacity="0.42"/>
  <line x1="11" y1="26" x2="25" y2="26" stroke="white" stroke-width="1.4" opacity="0.42"/>
  <line x1="11" y1="26" x2="11" y2="20" stroke="white" stroke-width="1.4" stroke-linecap="round" opacity="0.42"/>
  <line x1="25" y1="26" x2="25" y2="20" stroke="white" stroke-width="1.4" stroke-linecap="round" opacity="0.42"/>

  <!-- Right parent → grandparent horizontal bar -->
  <line x1="46" y1="30" x2="46" y2="26" stroke="white" stroke-width="1.4" stroke-linecap="round" opacity="0.42"/>
  <line x1="39" y1="26" x2="53" y2="26" stroke="white" stroke-width="1.4" opacity="0.42"/>
  <line x1="39" y1="26" x2="39" y2="20" stroke="white" stroke-width="1.4" stroke-linecap="round" opacity="0.42"/>
  <line x1="53" y1="26" x2="53" y2="20" stroke="white" stroke-width="1.4" stroke-linecap="round" opacity="0.42"/>

  <!-- ── Nodes ── -->

  <!-- Grandparent tier (4 nodes, top) -->
  <circle cx="11" cy="17" r="3.5" fill="white" opacity="0.68"/>
  <circle cx="25" cy="17" r="3.5" fill="white" opacity="0.68"/>
  <circle cx="39" cy="17" r="3.5" fill="white" opacity="0.68"/>
  <circle cx="53" cy="17" r="3.5" fill="white" opacity="0.68"/>

  <!-- Parent tier (2 nodes, mid) -->
  <circle cx="18" cy="35" r="5" fill="white" opacity="0.86"/>
  <circle cx="46" cy="35" r="5" fill="white" opacity="0.86"/>

  <!-- Root node — "you" (largest, bottom centre) -->
  <circle cx="32" cy="52" r="6.5" fill="url(#rg)"/>
</svg>
